<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ Correct favicon (Vite compatible) -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- ✅ Correct Title -->
    <title>CreatorsHelpline – Creative Solutions That Convert</title>

    <!-- ✅ SEO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CreatorsHelpline is a creative digital agency offering branding, web development, graphic design, and video editing solutions that convert."
    />
    <meta
      name="keywords"
      content="creative agency, web development, graphic design, video editing, branding, digital marketing"
    />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.pexels.com" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Custom font declaration -->
    <style>
      body::-webkit-scrollbar {
        width: 12px;
        padding: 10px;
      }

      /* Scrollbar track */
      body::-webkit-scrollbar-track {
        background: transparent;
      }

      /* Light Mode Scrollbar Thumb */
      body.light-mode::-webkit-scrollbar-thumb {
        background-color: #ff6900;
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }

      /* Dark Mode Scrollbar Thumb */
      body.dark-mode::-webkit-scrollbar-thumb {
        background-color: #ff6900;
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }

      @font-face {
        font-family: "Coolvetica";
        src: url("/fonts/coolvetica.woff") format("woff");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* Fallback for when Coolvetica is not available */
      .font-coolvetica {
        font-family:
          "Coolvetica",
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      /* Performance optimizations */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        scroll-behavior: smooth;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      /* Reduce motion for accessibility */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Dark mode support */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #000000;
          color: #ffffff;
        }
      }

      /* Loading screen styles */
      #loading-fallback {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: "Coolvetica", "Inter", sans-serif;
        transition: background 0.3s ease;
      }

      #loading-fallback.hidden {
        display: none;
      }

      @media (prefers-color-scheme: dark) {
        #loading-fallback {
          background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        }

        .loading-logo {
          color: #ffffff !important;
        }

        #loading-fallback p {
          color: #cccccc !important;
        }
      }

      .loading-logo {
        font-size: 3rem;
        font-weight: bold;
        color: #000000;
        margin-bottom: 1rem;
        transition: color 0.3s ease;
      }

      .loading-logo span {
        color: #f78305;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #f78305;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
